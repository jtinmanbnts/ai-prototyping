      black:    "#0f0f0f",
      dark:     "#121212",
      red:      "#cc050a",
      green:    "#008c45",
      posGreen: "#00994d",
      white:    "#ffffff",
      border:   "#dedede",
      border2:  "#d9d9d9",
      border3:  "#ccc",
      gray1:    "#737373",
      gray2:    "#a6a6a6",
      gray3:    "#b3b3b3",

      gray5:    "#666",

    const F = { sans: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" };

    function pillStyle(bg, color, border) {
      return {
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        padding: "8px 16px", borderRadius: 20,
        border: border ? `1px solid ${border}` : "none",
        background: bg, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0,
      };
    }

    function pillText(color, size = 13, weight = 500) {
      return { fontFamily: F.sans, fontSize: size, fontWeight: weight, color, lineHeight: "normal" };
    }

    function ClockIcon({ size = 40 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ flexShrink: 0 }}>
          <circle cx="20" cy="20" r="16" stroke="#1e1e1e" strokeWidth="1.5" />
          <line x1="20" y1="20" x2="20" y2="11" stroke="#1e1e1e" strokeWidth="1.5" strokeLinecap="round" />
          <line x1="20" y1="20" x2="27" y2="20" stroke="#1e1e1e" strokeWidth="1.5" strokeLinecap="round" />
        </svg>
      );
    }

    function StatsCard({ heading, body1, body2 }) {
      return (
        <div style={{ background: C.white, border: `1px solid ${C.border2}`, borderRadius: 8, padding: 24, display: "flex", flexDirection: "column", alignItems: "center", gap: 24, width: 316, flexShrink: 0, boxSizing: "border-box" }}>

              <p style={{ fontFamily: F.sans, fontSize: 16, fontWeight: 400, color: C.text, lineHeight: 1.4, margin: 0, whiteSpace: "nowrap" }}>{body1}</p>

          </div>
        </div>
      );
    }

      return (
        <div style={{ background: C.cream, width: "100%", padding: "24px 48px", boxSizing: "border-box", flexShrink: 0, ...style }}>
          {children}
        </div>
      );
    }

    function Card({ children, style }) {
      return (

                <span style={{ fontFamily: F.sans, fontWeight: 400, fontSize: 13, color: C.dark, whiteSpace: "pre" }}>{"Active                         6"}</span>

              </Card>
              <Card style={{ width: 430 }}>
                <div style={{ background: C.green, borderRadius: 4, padding: "4px 10px" }}>

              </Card>
            </div>
          </Section>

          {/* Your Plans */}
          <Section>
            <span style={{ fontFamily: F.sans, fontWeight: 600, fontSize: 20, color: C.red, display: "block", marginBottom: 16 }}>Your plans</span>

    function BIndustries() {
      const [idx, setIdx] = React.useState(0);
      const industries = ["Financial Services", "Healthcare", "Telecommunications", "Retail", "Restaurant & Convenience", "Consumer Goods", "Logistics", "Travel & Hospitality", "Industrial & Manufacturing", "Media & Entertainment"];
      const cardW = 340;
      const cardGap = 16;
      const maxIdx = industries.length - 3; // keep 2 full + 1 partial always in view
      const prev = () => setIdx(i => Math.max(0, i - 1));
      const next = () => setIdx(i => Math.min(maxIdx, i + 1));
      return (
        <div style={{ background: B.darkIndigo, padding: "72px 80px", flexShrink: 0 }}>
          <div style={{ display: "flex", gap: 64, alignItems: "flex-start" }}>

            {/* Left: title + description stacked */}

              <h2 style={{ fontFamily: NB, fontWeight: 800, fontSize: 36, color: B.white, lineHeight: 1.2, marginBottom: 20 }}>
                Deep Industry Specialization

              <p style={{ fontFamily: NB, fontWeight: 400, fontSize: 16, color: "rgba(255,255,255,0.65)", lineHeight: 1.65 }}>
                Industry-specific challenges require extensive industry expertise.
              </p>
            </div>

            {/* Right: carousel — 2 full cards + partial 3rd */}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ overflow: "hidden" }}>
                <div style={{
                  display: "flex",
                  gap: cardGap,
                  transform: `translateX(-${idx * (cardW + cardGap)}px)`,
                  transition: "transform 0.3s ease",
                }}>
                  {industries.map(ind => (
                    <div key={ind} style={{
                      width: cardW, minHeight: 200, flexShrink: 0,
                      border: "1px solid rgba(255,255,255,0.18)",
                      borderRadius: 10, padding: "28px 24px",
                      background: "rgba(255,255,255,0.05)",
                    }}>
                      <div style={{ fontFamily: NB, fontWeight: 700, fontSize: 20, color: B.white, lineHeight: 1.35 }}>{ind}</div>
                    </div>
                  ))}
                </div>
              </div>
              {/* Arrow controls */}
              <div style={{ display: "flex", gap: 12, marginTop: 24 }}>
                {[{ fn: prev, label: "←", active: idx > 0 }, { fn: next, label: "→", active: idx < maxIdx }].map(({ fn, label, active }) => (
                  <button key={label} onClick={fn} style={{
                    width: 44, height: 44, borderRadius: "50%",
                    border: `1px solid rgba(255,255,255,${active ? 0.45 : 0.15})`,
                    background: "transparent",
                    color: active ? B.white : "rgba(255,255,255,0.25)",
                    fontFamily: NB, fontSize: 18, cursor: active ? "pointer" : "default",
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}>{label}</button>
                ))}
              </div>
            </div>

          </div>
        </div>
      );
    }
